services:
  config:
    # Render FixMyStreet `conf/general.yml` from `conf/general.yml-example` + root `.env`.
    # We avoid bind mounts because Coolify may not mount your repository into the config container.
    build:
      context: .
      dockerfile: docker/Dockerfile-render-general-yml
    environment:
      BASE_URL: "${BASE_URL:-https://www.kenyawewant.com}"
      EMAIL_DOMAIN: "${EMAIL_DOMAIN:-kenyawewant.com}"
      CONTACT_EMAIL: "${CONTACT_EMAIL:-help@kenyawewant.com}"
      CONTACT_NAME: "${CONTACT_NAME:-FixMyStreet}"
      DO_NOT_REPLY_EMAIL: "${DO_NOT_REPLY_EMAIL:-help@kenyawewant.com}"

      FMS_DB_HOST: "${FMS_DB_HOST:-postgres.svc}"
      FMS_DB_PORT: "${FMS_DB_PORT:-5432}"
      FMS_DB_NAME: "${FMS_DB_NAME:-fixmystreet}"
      FMS_DB_USER: "${FMS_DB_USER:-fms}"
      FMS_DB_PASS: "${FMS_DB_PASS:-fms}"

      STAGING_SITE: "${STAGING_SITE:-0}"
      STAGING_FLAGS_SEND_REPORTS: "${STAGING_FLAGS_SEND_REPORTS:-0}"
      STAGING_FLAGS_SKIP_CHECKS: "${STAGING_FLAGS_SKIP_CHECKS:-0}"
      STAGING_FLAGS_HIDE_STAGING_BANNER: "${STAGING_FLAGS_HIDE_STAGING_BANNER:-0}"

      MAPIT_URL: "${MAPIT_URL:-}"
      MAPIT_TYPES: "${MAPIT_TYPES:-[ 'ZZZ' ]}"

      SMTP_SMARTHOST: "${SMTP_SMARTHOST:-localhost}"
      SMTP_TYPE: "${SMTP_TYPE:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"

      MEMCACHED_HOST: "${MEMCACHED_HOST:-memcached.svc}"
      CACHE_TIMEOUT: "${CACHE_TIMEOUT:-3600}"
      QUEUE_DAEMON_PROCESSES: "${QUEUE_DAEMON_PROCESSES:-4}"

      ALLOWED_COBRANDS: "${ALLOWED_COBRANDS:-[ 'default' ]}"
    volumes:
      - fms-config:/out
    command: sh -c 'cp -a /var/www/fixmystreet/fixmystreet/conf/. /out/ && perl /opt/render-general-yml.pl && tail -f /dev/null'
    healthcheck:
      test: ["CMD-SHELL", "test -s /out/general.yml"]
      interval: 5s
      timeout: 5s
      retries: 12
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile-nginx
    depends_on:
      - fixmystreet
    ports:
      - "${HTTP_PORT:-8093}:80"
    networks:
      default:
        aliases:
          - nginx.svc
  fixmystreet:
    image: fixmystreet/fixmystreet:stable
    tty: true
    depends_on:
      config:
        condition: service_healthy
      postgres:
        condition: service_healthy
      memcached:
        condition: service_started
    cgroup: host
    stop_signal: SIGRTMIN+3
    volumes:
      - fms-config:/var/www/fixmystreet/fixmystreet/conf
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - type: tmpfs
        target: /run
        tmpfs:
          size: "104857600"
      - type: tmpfs
        target: /run/lock
        tmpfs:
          size: "104857600"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      FMS_DB_HOST: "${FMS_DB_HOST:-postgres.svc}"
      FMS_DB_PASS: "${FMS_DB_PASS:-fms}"
      FMS_DB_NAME: "${FMS_DB_NAME:-fixmystreet}"
      FMS_DB_USER: "${FMS_DB_USER:-fms}"
      FMS_ROOT: "${FMS_ROOT:-/var/www/fixmystreet/fixmystreet}"
      SUPERUSER_EMAIL: "${SUPERUSER_EMAIL:-superuser@example.org}"
      SUPERUSER_PASSWORD: "${SUPERUSER_PASSWORD:-change_me_now}"
    networks:
      default:
        aliases:
          - fixmystreet.svc
  postgres:
    build:
      dockerfile_inline: |
        FROM postgres:13.11
        RUN localedef -i en_GB -c -f UTF-8 -A /usr/share/locale/locale.alias en_GB.UTF-8
        ENV LANG=en_GB.utf8
    restart: always
    volumes:
      - fixmystreet-pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      PGDATA: '/var/lib/postgresql/data/pgdata'
    networks:
      default:
        aliases:
          - postgres.svc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  memcached:
    image: memcached:1.6.32
    restart: always
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  fixmystreet-pgdata:
  fms-config:
