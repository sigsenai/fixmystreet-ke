services:
  config:
    # Render `conf/general.yml.deployed` from `conf/general.yml-example` + root `.env`.
    # FixMyStreet does not expand `${VAR}` itself, so we generate a concrete file.
    image: perl:5.38-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: perl ./docker/render-general-yml.pl
    env_file:
      - .env
  nginx:
    image: nginx:1.27.2
    depends_on:
      - fixmystreet
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./conf/nginx.conf-docker:/etc/nginx/conf.d/default.conf
    networks:
      default:
        aliases:
          - nginx.svc
  fixmystreet:
    image: fixmystreet/fixmystreet:stable
    tty: true
    depends_on:
      config:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      memcached:
        condition: service_started
    cgroup: host
    stop_signal: SIGRTMIN+3
    volumes:
      - ./conf/general.yml.deployed:/var/www/fixmystreet/fixmystreet/conf/general.yml
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - type: tmpfs
        target: /run
        tmpfs:
          size: "104857600"
      - type: tmpfs
        target: /run/lock
        tmpfs:
          size: "104857600"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      FMS_DB_HOST: "${FMS_DB_HOST}"
      FMS_DB_PASS: "${FMS_DB_PASS}"
      FMS_DB_NAME: "${FMS_DB_NAME}"
      FMS_DB_USER: "${FMS_DB_USER}"
      FMS_ROOT: "${FMS_ROOT}"
      SUPERUSER_EMAIL: "${SUPERUSER_EMAIL}"
      SUPERUSER_PASSWORD: "${SUPERUSER_PASSWORD}"
    networks:
      default:
        aliases:
          - fixmystreet.svc
  postgres:
    build:
      dockerfile_inline: |
        FROM postgres:13.11
        RUN localedef -i en_GB -c -f UTF-8 -A /usr/share/locale/locale.alias en_GB.UTF-8
        ENV LANG=en_GB.utf8
    restart: always
    volumes:
      - fixmystreet-pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PGDATA: '/var/lib/postgresql/data/pgdata'
    networks:
      default:
        aliases:
          - postgres.svc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  memcached:
    image: memcached:1.6.32
    restart: always
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  fixmystreet-pgdata:
